version: '3.9'

services:
  app:
    build: .
    command: uvicorn src.app:app --host 0.0.0.0 --port 8000
    depends_on:
      - redis
    env_file:
      - .env
    volumes:
      - .:/app
    ports:
      - "8000:8000"

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

volumes:
  redis_data:
    driver: local
